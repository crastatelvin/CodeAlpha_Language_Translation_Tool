<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neural Translator</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-container">
    <header><h1>Neural Translator</h1></header>
    <main class="translator-matrix">
      <section class="input-panel">
        <textarea id="sourceText" placeholder="Type text here..."></textarea>
      </section>
      <section class="control-hub">
        <button id="translateBtn">Translate</button>
      </section>
      <section class="output-panel">
        <div id="outputText">Translation will appear here...</div>
        <div class="actions">
          <button id="ttsBtn">Speak</button>
          <button id="copyBtn">Copy</button>
        </div>
      </section>
    </main>
  </div>
  <script src="index.js"></script>
</body>
</html>
